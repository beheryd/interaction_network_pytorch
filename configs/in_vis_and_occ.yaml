# Rajalingham "Vis&Occ" class — supervises ball position during occluded epoch + intercept y.
# This is the M3 pilot config (G1 / Fig. 5B is the primary deliverable, and "Vis&Occ" /
# sim-mov is the most demanding loss variant — drives the model to do mental simulation).
model:
  effect_dim: 10
  relational_hidden: 150
training:
  loss_variant: sim-mov
  optimizer: adam
  lr: 1.0e-3
  batch_size: 32
  max_steps: 50000
  log_every: 100
  checkpoint_every: 5000
  conditions_per_batch_source: random
seed: 0
